name: CI - PrimeTechFinal Ant Build

on:
  push:
    branches: [ master, develop ]
    paths:
      - 'Java/PrimeTechFinal/**'
      - '.github/workflows/ci-ant.yml'
  pull_request:
    branches: [ master, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 1.8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'adopt'
    
    - name: Install Ant
      run: sudo apt-get update && sudo apt-get install -y ant
    
    - name: Install GUI dependencies for Swing
      run: sudo apt-get install -y xvfb libxkbcommon-x11-0
    
    - name: Show Ant version
      run: ant -version
    
    - name: Build with Ant
      run: cd Java/PrimeTechFinal && ant clean build
    
    - name: Run tests with Ant
      run: cd Java/PrimeTechFinal && xvfb-run -a ant test || true
    
    - name: Upload build artifacts
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: build-artifacts-jdk8
        path: Java/PrimeTechFinal/dist/
        retention-days: 30

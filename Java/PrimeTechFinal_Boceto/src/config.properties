# ============================================================
# config.properties — PrimeTech Systems
# NO subir este archivo a repositorios publicos (contiene credenciales)
# ============================================================

# ── Base de datos ────────────────────────────────────────────
db.url=jdbc:mysql://localhost:3306/tienda_informatica?useSSL=true&serverTimezone=Europe/Madrid&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
db.usuario.app=tienda_app
db.clave.app=app_pass
db.usuario.admin=tienda_admin
db.clave.admin=admin_pass

# ── Seguridad de login ───────────────────────────────────────
# Numero de intentos fallidos antes de bloquear la cuenta temporalmente
seguridad.max.intentos=5
# Minutos que dura el bloqueo tras superar los intentos fallidos
seguridad.bloqueo.minutos=15

# ── Sesion ───────────────────────────────────────────────────
# Minutos de inactividad antes de cerrar sesion automaticamente
sesion.timeout.minutos=30

# ── Datos de empresa (para facturas) ────────────────────────
empresa.nombre=Prime Tech Systems
empresa.cif=A12345678
empresa.email=info@primetechfinal.es
empresa.telefono=976 000 000
empresa.direccion=Zaragoza, Espana
empresa.iva=0.21
